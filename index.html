<!DOCTYPE html>
<html>
<head>
  <title>BFHL API Tester</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    textarea {
      width: 300px;
      height: 100px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    pre {
      text-align: left;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
      overflow-x: auto;
    }
  </style>
</head>

<body>

  <h1>SRM Full Stack Challenge 🚀</h1>

  <p>Enter nodes (comma separated)</p>

  <textarea id="input">A->B, A->C, B->D</textarea><br>

  <button onclick="send()">Submit</button>

  <pre id="output">Response will appear here...</pre>

  <script>
    async function send() {
      const raw = document.getElementById("input").value;

      const data = raw.split(",").map(x => x.trim());

      try {
        const res = await fetch("https://laxmipriya-bfhl.onrender.com/bfhl", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ data })
        });

        const json = await res.json();

        document.getElementById("output").innerText =
          JSON.stringify(json, null, 2);

      } catch (err) {
        document.getElementById("output").innerText =
          "Error: " + err.message;
      }
    }
  </script>

</body>
</html>
